<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <form>
            <div class="mb-3">
              <label for="u_name" class="form-label">Username</label>
              <input type="text" id="u_name" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="u_comment" class="form-label">Comment</label>
              <textarea id="u_comment" class="form-control" rows="5"></textarea>
            </div>
            <div class="mb-3">
              <label for="u_text" class="form-label">Some Text</label>
              <input
                type="text"
                id="u_text"
                class="form-control form-control-lg"
              />
            </div>
            <div class="mb-3">
              <label for="u_text" class="form-label">Some Text</label>
              <input
                type="text"
                id="u_text"
                class="form-control form-control-sm"
              />
            </div>
            <div class="mb-3">
              <label for="u_email" class="form-label">Email Address</label>
              <input
                type="email"
                id="u_email"
                class="form-control"
                value="jon@gmail.com"
                readonly
              />
            </div>
            <div class="mb-3">
              <label for="u_file" class="form-label">File Upload</label>
              <input type="file" id="u_file" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="u_file" class="form-label">File Upload</label>
              <input type="file" id="u_file" class="form-control" disabled />
            </div>
            <div class="mb-3">
              <label for="u_color" class="form-label">Color Picker</label>
              <input
                type="color"
                id="u_color"
                class="form-control form-control-color"
              />
            </div>
            <div class="mb-3">
              <label for="u_color" class="form-label">Color Picker</label>
              <input
                type="color"
                id="u_color"
                class="form-control form-control-color"
                disabled
              />
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
