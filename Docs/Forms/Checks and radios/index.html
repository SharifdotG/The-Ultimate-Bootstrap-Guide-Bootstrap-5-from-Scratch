<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-5 mb-5">
      <h2>Checks</h2>
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          id="checkDefault"
        />
        <label class="form-check-label" for="checkDefault">
          Default checkbox
        </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          id="checkChecked"
          checked
        />
        <label class="form-check-label" for="checkChecked">
          Checked checkbox
        </label>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Disabled</h2>
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          id="checkDefault"
          disabled
        />
        <label class="form-check-label" for="checkDefault">
          Default checkbox
        </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          id="checkChecked"
          checked
          disabled
        />
        <label class="form-check-label" for="checkChecked">
          Checked checkbox
        </label>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Radios</h2>
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="radioDefault"
          id="radioDefault1"
        />
        <label class="form-check-label" for="radioDefault1">
          Default radio
        </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="radioDefault"
          id="radioDefault2"
          checked
        />
        <label class="form-check-label" for="radioDefault2">
          Default checked radio
        </label>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Disabled</h2>
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="radioDisabled"
          id="radioDisabled"
          disabled
        />
        <label class="form-check-label" for="radioDisabled">
          Disabled radio
        </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="radioDisabled"
          id="radioCheckedDisabled"
          checked
          disabled
        />
        <label class="form-check-label" for="radioCheckedDisabled">
          Disabled checked radio
        </label>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Switches</h2>
      <div class="form-check form-switch">
        <input
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckDefault"
        />
        <label class="form-check-label" for="switchCheckDefault"
          >Default switch checkbox input</label
        >
      </div>
      <div class="form-check form-switch">
        <input
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckChecked"
          checked
        />
        <label class="form-check-label" for="switchCheckChecked"
          >Checked switch checkbox input</label
        >
      </div>
      <div class="form-check form-switch">
        <input
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckDisabled"
          disabled
        />
        <label class="form-check-label" for="switchCheckDisabled"
          >Disabled switch checkbox input</label
        >
      </div>
      <div class="form-check form-switch">
        <input
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckCheckedDisabled"
          checked
          disabled
        />
        <label class="form-check-label" for="switchCheckCheckedDisabled"
          >Disabled checked switch checkbox input</label
        >
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Native switches</h2>
      <div class="form-check form-switch">
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          id="checkNativeSwitch"
          switch
        />
        <label class="form-check-label" for="checkNativeSwitch">
          Native switch haptics
        </label>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Default (stacked)</h2>
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          id="defaultCheck1"
        />
        <label class="form-check-label" for="defaultCheck1">
          Default checkbox
        </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          id="defaultCheck2"
          disabled
        />
        <label class="form-check-label" for="defaultCheck2">
          Disabled checkbox
        </label>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Default (stacked) 2</h2>
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="exampleRadios"
          id="exampleRadios1"
          value="option1"
          checked
        />
        <label class="form-check-label" for="exampleRadios1">
          Default radio
        </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="exampleRadios"
          id="exampleRadios2"
          value="option2"
        />
        <label class="form-check-label" for="exampleRadios2">
          Second default radio
        </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="exampleRadios"
          id="exampleRadios3"
          value="option3"
          disabled
        />
        <label class="form-check-label" for="exampleRadios3">
          Disabled radio
        </label>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Inline</h2>
      <div class="form-check form-check-inline">
        <input
          class="form-check-input"
          type="checkbox"
          id="inlineCheckbox1"
          value="option1"
        />
        <label class="form-check-label" for="inlineCheckbox1">1</label>
      </div>
      <div class="form-check form-check-inline">
        <input
          class="form-check-input"
          type="checkbox"
          id="inlineCheckbox2"
          value="option2"
        />
        <label class="form-check-label" for="inlineCheckbox2">2</label>
      </div>
      <div class="form-check form-check-inline">
        <input
          class="form-check-input"
          type="checkbox"
          id="inlineCheckbox3"
          value="option3"
          disabled
        />
        <label class="form-check-label" for="inlineCheckbox3"
          >3 (disabled)</label
        >
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Reverse</h2>
      <div class="form-check form-check-reverse">
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          id="reverseCheck1"
        />
        <label class="form-check-label" for="reverseCheck1">
          Reverse checkbox
        </label>
      </div>
      <div class="form-check form-check-reverse">
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          id="reverseCheck2"
          disabled
        />
        <label class="form-check-label" for="reverseCheck2">
          Disabled reverse checkbox
        </label>
      </div>

      <div class="form-check form-switch form-check-reverse">
        <input
          class="form-check-input"
          type="checkbox"
          id="switchCheckReverse"
        />
        <label class="form-check-label" for="switchCheckReverse"
          >Reverse switch checkbox input</label
        >
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Without labels</h2>
      <div>
        <input
          class="form-check-input"
          type="checkbox"
          id="checkboxNoLabel"
          value=""
          aria-label="..."
        />
      </div>

      <div>
        <input
          class="form-check-input"
          type="radio"
          name="radioNoLabel"
          id="radioNoLabel1"
          value=""
          aria-label="..."
        />
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Toggle buttons (Checkbox toggle buttons)</h2>
      <input
        type="checkbox"
        class="btn-check"
        id="btn-check"
        autocomplete="off"
      />
      <label class="btn btn-primary" for="btn-check">Single toggle</label>

      <input
        type="checkbox"
        class="btn-check"
        id="btn-check-2"
        checked
        autocomplete="off"
      />
      <label class="btn btn-primary" for="btn-check-2">Checked</label>

      <input
        type="checkbox"
        class="btn-check"
        id="btn-check-3"
        autocomplete="off"
        disabled
      />
      <label class="btn btn-primary" for="btn-check-3">Disabled</label>

      <input
        type="checkbox"
        class="btn-check"
        id="btn-check-4"
        autocomplete="off"
      />
      <label class="btn" for="btn-check-4">Single toggle</label>

      <input
        type="checkbox"
        class="btn-check"
        id="btn-check-5"
        checked
        autocomplete="off"
      />
      <label class="btn" for="btn-check-5">Checked</label>

      <input
        type="checkbox"
        class="btn-check"
        id="btn-check-6"
        autocomplete="off"
        disabled
      />
      <label class="btn" for="btn-check-6">Disabled</label>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Toggle buttons (Radio toggle buttons)</h2>
      <input
        type="radio"
        class="btn-check"
        name="options"
        id="option1"
        autocomplete="off"
        checked
      />
      <label class="btn btn-secondary" for="option1">Checked</label>

      <input
        type="radio"
        class="btn-check"
        name="options"
        id="option2"
        autocomplete="off"
      />
      <label class="btn btn-secondary" for="option2">Radio</label>

      <input
        type="radio"
        class="btn-check"
        name="options"
        id="option3"
        autocomplete="off"
        disabled
      />
      <label class="btn btn-secondary" for="option3">Disabled</label>

      <input
        type="radio"
        class="btn-check"
        name="options"
        id="option4"
        autocomplete="off"
      />
      <label class="btn btn-secondary" for="option4">Radio</label>

      <input
        type="radio"
        class="btn-check"
        name="options-base"
        id="option5"
        autocomplete="off"
        checked
      />
      <label class="btn" for="option5">Checked</label>

      <input
        type="radio"
        class="btn-check"
        name="options-base"
        id="option6"
        autocomplete="off"
      />
      <label class="btn" for="option6">Radio</label>

      <input
        type="radio"
        class="btn-check"
        name="options-base"
        id="option7"
        autocomplete="off"
        disabled
      />
      <label class="btn" for="option7">Disabled</label>

      <input
        type="radio"
        class="btn-check"
        name="options-base"
        id="option8"
        autocomplete="off"
      />
      <label class="btn" for="option8">Radio</label>
    </div>

    <div class="container mt-5 mb-5">
      <h2>Toggle buttons (Outlined styles)</h2>
      <input
        type="checkbox"
        class="btn-check"
        id="btn-check-outlined"
        autocomplete="off"
      />
      <label class="btn btn-outline-primary" for="btn-check-outlined"
        >Single toggle</label
      ><br />

      <input
        type="checkbox"
        class="btn-check"
        id="btn-check-2-outlined"
        checked
        autocomplete="off"
      />
      <label class="btn btn-outline-secondary" for="btn-check-2-outlined"
        >Checked</label
      ><br />

      <input
        type="radio"
        class="btn-check"
        name="options-outlined"
        id="success-outlined"
        autocomplete="off"
        checked
      />
      <label class="btn btn-outline-success" for="success-outlined"
        >Checked success radio</label
      >

      <input
        type="radio"
        class="btn-check"
        name="options-outlined"
        id="danger-outlined"
        autocomplete="off"
      />
      <label class="btn btn-outline-danger" for="danger-outlined"
        >Danger radio</label
      >
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
